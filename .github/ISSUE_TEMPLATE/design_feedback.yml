name: Design or product feedback
description: Share focused feedback on Kocteau's experience.
title: "design: "
labels:
  - design
  - needs design review
body:
  - type: textarea
    id: surface
    attributes:
      label: Surface
      description: Where does this feedback apply?
      placeholder: Feed, review card, track page, onboarding, search...
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What feels unclear, noisy, broken, or off-brand?
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested direction
      description: Describe the smallest change that would improve it.
  - type: textarea
    id: media
    attributes:
      label: Screenshots, references, or examples
