name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    steps:
      - name: Release Please
        id: release-please
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release contents
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Draft public changelog note
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        run: node apps/web/scripts/create-public-changelog-draft.mjs

      - name: Open public changelog draft PR
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        id: public-changelog-pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/public-changelog-${{ steps.release-please.outputs.tag_name }}
          commit-message: "docs(web): draft public changelog for ${{ steps.release-please.outputs.tag_name }}"
          title: "docs(web): draft public changelog for ${{ steps.release-please.outputs.tag_name }}"
          body: |
            This PR drafts the public Kocteau changelog note for `${{ steps.release-please.outputs.tag_name }}` from the technical Release Please changelog.

            The maintainer should review tone, add screenshots if useful, and merge when the note is ready to publish.
          labels: |
            docs
            area:web
