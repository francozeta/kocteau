<!--
Subject: Your Kocteau sign-in code
Preheader: Use this code to continue to Kocteau.

Paste this into Supabase Auth -> Email Templates for OTP/code based auth.
Use a PNG logo for email clients. SVG is not reliable in Outlook and some Gmail contexts.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <title>Your Kocteau sign-in code</title>
  </head>
  <body style="margin:0;background:#070707;color:#f4f1ea;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
    <div style="display:none;max-height:0;max-width:0;opacity:0;overflow:hidden;">
      Use {{ .Token }} to continue to Kocteau.
    </div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width:100%;background:#070707;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="width:100%;max-width:560px;margin:0 auto;">
            <tr>
              <td style="border:1px solid #262626;border-radius:24px;background:#0d0d0d;padding:34px 28px;">
                <div style="text-align:center;padding-bottom:28px;">
                  <img src="https://kocteau.com/logo-k.png" width="42" height="42" alt="Kocteau" style="display:inline-block;width:42px;height:42px;border-radius:14px;border:1px solid #2d2d2d;" />
                </div>
                <p style="margin:0 0 12px;color:#9b9b9b;font-size:12px;line-height:18px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;">
                  Kocteau access
                </p>
                <h1 style="margin:0;color:#f7f4ee;font-size:28px;line-height:34px;font-weight:700;letter-spacing:0;">
                  Your code is ready.
                </h1>
                <p style="margin:18px 0 0;color:#b8b4ad;font-size:15px;line-height:24px;font-weight:400;">
                  Enter this one-time code to continue. It expires soon.
                </p>
                <div style="margin:28px 0 0;border:1px solid #2b2b2b;border-radius:18px;background:#141414;color:#fff7ef;font-size:34px;line-height:42px;font-weight:700;letter-spacing:8px;padding:20px 18px;text-align:center;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;">
                  {{ .Token }}
                </div>
                <div style="padding-top:28px;">
                  <a href="https://kocteau.com/login" style="display:block;border-radius:12px;background:#f4f1ea;color:#090909;font-size:14px;line-height:20px;font-weight:700;text-align:center;text-decoration:none;padding:13px 18px;">
                    Open Kocteau
                  </a>
                </div>
                <p style="margin:18px 0 0;color:#7d7d7d;font-size:12px;line-height:19px;">
                  Never share this code. Kocteau will never ask for it outside the sign-in screen.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 8px 0;color:#686868;font-size:12px;line-height:18px;text-align:center;">
                If this was not you, you can ignore this message.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
